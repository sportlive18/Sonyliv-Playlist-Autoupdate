name: Update SonyLIV M3U

on:
  schedule:
    - cron: '*/7 * * * *' # Runs every 7 minutes
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Need write permission to push the updated M3U file
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download latest M3U
        run: |
          curl -s -L -o sonyliv.m3u "https://raw.githubusercontent.com/drmlive/sliv-live-events/refs/heads/main/sonyliv.m3u"
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "sportlive18"
          git config --global user.email "271363488+sportlive18@users.noreply.github.com"
          git add sonyliv.m3u
          # The commit will only happen if there are changes to sonyliv.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sonyliv.m3u playlist" && git push)
